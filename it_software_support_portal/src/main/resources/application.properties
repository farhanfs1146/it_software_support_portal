spring.application.name=it_software_support_portal

# set port of server
server.port = 9092

# set database path/connection string
spring.datasource.url=jdbc:postgresql://localhost:5432/ITSoftwareSupport
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate schema
spring.datasource.hikari.schema=it_software_support_db

# Flyway schema (CRITICAL)
spring.flyway.schemas=it_software_support_db
spring.flyway.default-schema=it_software_support_db

# Flyway migration path
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true